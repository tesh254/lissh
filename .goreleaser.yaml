version: 2

project_name: lissh

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    binary: lissh

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - install.sh

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^Merge branch"
      - "^Merge pull request"

release:
  draft: false
  prerelease: false
  header: |
    ## Installation
    
    ### Quick Install (Recommended)
    ```bash
    curl -fsSL https://raw.githubusercontent.com/tesh254/lissh/main/install.sh | bash
    ```
    
    ### Manual Install
    
    Download the appropriate binary for your platform and add it to your PATH.
    
    #### Linux
    ```bash
    curl -fsSL https://github.com/tesh254/lissh/releases/latest/download/lissh_Linux_x86_64.tar.gz | tar xz
    ```
    
    #### macOS
    ```bash
    curl -fsSL https://github.com/tesh254/lissh/releases/latest/download/lissh_Darwin_x86_64.tar.gz | tar xz
    ```
    
    #### Windows
    Download from releases page or use winget:
    ```bash
    winget install tesh254.lissh
    ```
