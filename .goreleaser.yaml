version: 2

project_name: lissh

before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    binary: lissh

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers:
  - image_templates:
      - "ghcr.io/wcrg/lissh:{{ .Tag }}"
      - "ghcr.io/wcrg/lissh:v{{ .Major }}"
      - "ghcr.io/wcrg/lissh:v{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/wcrg/lissh:latest"
    dockerfile: .docker/Dockerfile-goreleaser
