name: CI

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GO_VERSION: '1.25.5'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build -v ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Determine version
        id: version
        run: |
          # Get last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"
          
          # Parse version parts
          LAST_MAJOR=$(echo $LAST_TAG | sed 's/v//' | cut -d. -f1)
          LAST_MINOR=$(echo $LAST_TAG | sed 's/v//' | cut -d. -f2)
          LAST_PATCH=$(echo $LAST_TAG | sed 's/v//' | cut -d. -f3)
          
          # Default bump is patch
          BUMP_TYPE=${BUMP_TYPE:-patch}
          
          # Check commit messages for bump hints
          COMMITS=$(git log --oneline $LAST_TAG..HEAD 2>/dev/null || git log --oneline -20)
          if echo "$COMMITS" | grep -qiE '^[^:]*:.*(breaking|major)'; then
            BUMP_TYPE="major"
          elif echo "$COMMITS" | grep -qiE '^[^:]*:.*(feat|feature|minor)'; then
            BUMP_TYPE="minor"
          fi
          
          # Calculate new version
          case $BUMP_TYPE in
            major)
              NEW_MAJOR=$((LAST_MAJOR + 1))
              NEW_MINOR=0
              NEW_PATCH=0
              ;;
            minor)
              NEW_MAJOR=$LAST_MAJOR
              NEW_MINOR=$((LAST_MINOR + 1))
              NEW_PATCH=0
              ;;
            patch)
              NEW_MAJOR=$LAST_MAJOR
              NEW_MINOR=$LAST_MINOR
              NEW_PATCH=$((LAST_PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="v${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP_TYPE" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          
          CHANGELOG="# Changelog\n\n"
          CHANGELOG+="## ${{ steps.version.outputs.version }}\n"
          CHANGELOG+="### Changes\n\n"
          
          # Get commits since last tag
          COMMITS=$(git log --oneline $LAST_TAG..HEAD 2>/dev/null || git log --oneline -20)
          while IFS= read -r line; do
            # Extract commit message (after commit hash)
            MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
            # Capitalize first letter
            MSG=$(echo "$MSG" | sed 's/^./\U&/')
            CHANGELOG+="- $MSG\n"
          done <<< "$COMMITS"
          
          echo -e "$CHANGELOG" > CHANGELOG.md
          echo "changelog_file=CHANGELOG.md" >> $GITHUB_OUTPUT
          cat CHANGELOG.md

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.version }}

      - name: Push tag
        run: |
          git push origin ${{ steps.version.outputs.version }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - name: Setup Go environment
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
